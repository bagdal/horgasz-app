<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horgász Alkalmazás</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e293b',
                        secondary: '#3b82f6',
                        accent: '#f43f5e',
                        success: '#10b981',
                        warning: '#f59e0b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Segoe UI', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.37)',
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'card-hover': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            transition: all 0.3s ease;
        }
        
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        
        .nav-link {
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            color: #3b82f6;
        }
        
        .nav-link.active {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
        }
        
        #map {
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .table-container {
            border-radius: 12px;
            overflow: hidden;
        }
        
        table {
            border-collapse: separate;
            border-spacing: 0;
        }
        
        th {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
        }
        
        tr:hover td {
            background: rgba(59, 130, 246, 0.05);
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-gray-100">
    <nav class="glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <i class="fas fa-fish text-2xl mr-3 text-blue-400"></i>
                    <span class="text-xl font-bold gradient-text">Horgász Alkalmazás</span>
                </div>
                <div class="flex space-x-4">
                    <button onclick="showSection('naplo')" class="nav-link px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/10 active" id="naploLink">
                        <i class="fas fa-book mr-2"></i>Napló
                    </button>
                    <button onclick="showSection('terkep')" class="nav-link px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/10" id="terkepLink">
                        <i class="fas fa-map-marker-alt mr-2"></i>Térkép
                    </button>
                    <button onclick="showSection('analizis')" class="nav-link px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/10" id="analizisLink">
                        <i class="fas fa-chart-line mr-2"></i>Analízis
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Napló szekció -->
        <div id="naploSection" class="fade-in">
            <div class="glass-card rounded-2xl shadow-card p-6 mb-6 card-hover">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">
                        <i class="fas fa-book mr-3 text-blue-500"></i>Horgászati Napló
                    </h2>
                    <button class="btn-gradient text-white px-6 py-2 rounded-lg font-medium" onclick="document.getElementById('importFile').click()">
                        <i class="fas fa-file-import mr-2"></i>Importálás
                    </button>
                    <input type="file" id="importFile" accept=".csv,.xlsx,.xls" style="display: none" onchange="importCatches()">
                    <span id="importStatus" class="ml-3 text-sm"></span>
                </div>
                
                <form id="naploForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Dátum</label>
                            <input type="date" id="datum" class="input-field w-full px-4 py-2 rounded-lg" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Helyszín</label>
                            <input type="text" id="helyszin" class="input-field w-full px-4 py-2 rounded-lg" placeholder="Helyszín megadása">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Halfaj</label>
                            <select id="halfaj" class="input-field w-full px-4 py-2 rounded-lg">
                                <option value="">Válasszon halfajt...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Súly (kg)</label>
                            <input type="number" id="suly" step="0.01" class="input-field w-full px-4 py-2 rounded-lg" placeholder="0.00">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Hossz (cm)</label>
                            <input type="number" id="hossz" step="0.1" class="input-field w-full px-4 py-2 rounded-lg" placeholder="0.0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Csali</label>
                            <input type="text" id="csali" class="input-field w-full px-4 py-2 rounded-lg" placeholder="Csali megadása">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Etetőanyag</label>
                            <input type="text" id="etetoanyag" class="input-field w-full px-4 py-2 rounded-lg" placeholder="Etetőanyag megadása">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">PVA tartalom</label>
                            <input type="text" id="pva_tartalom" class="input-field w-full px-4 py-2 rounded-lg" placeholder="Mi volt a PVA-ban">
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" id="pva_hasznalata" class="w-5 h-5 text-blue-500 rounded">
                            <label for="pva_hasznalata" class="ml-2 text-sm font-medium text-gray-700">PVA használata</label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Megjegyzés</label>
                        <textarea id="megjegyzes" rows="3" class="input-field w-full px-4 py-2 rounded-lg" placeholder="Megjegyzés megadása"></textarea>
                    </div>
                    <div class="flex space-x-4">
                        <button type="submit" class="btn-gradient text-white px-8 py-3 rounded-lg font-medium">
                            <i class="fas fa-save mr-2"></i>Mentés
                        </button>
                        <button type="button" onclick="getLocation()" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-lg font-medium transition-all">
                            <i class="fas fa-location-arrow mr-2"></i>GPS Helymeghatározás
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Időjárás kártya -->
            <div id="weatherCard" class="glass-card rounded-2xl shadow-card p-6 mb-6 card-hover hidden">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">Időjárás</h3>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                            <div><i class="fas fa-wind mr-2 text-blue-500"></i><span id="szelsebesseg">-</span> km/h</div>
                            <div><i class="fas fa-compass mr-2 text-blue-500"></i><span id="selirany">-</span></div>
                            <div><i class="fas fa-thermometer-half mr-2 text-red-500"></i><span id="homerseklet">-</span>°C</div>
                            <div><i class="fas fa-tint mr-2 text-blue-500"></i><span id="paratartalom">-</span>%</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-4xl mb-2" id="weatherIcon">🌤️</div>
                        <div class="text-sm text-gray-600" id="holdFazis">-</div>
                    </div>
                </div>
            </div>
            
            <!-- Napló táblázat -->
            <div class="glass-card rounded-2xl shadow-card p-6 card-hover">
                <h3 class="text-xl font-bold text-gray-800 mb-4">
                    <i class="fas fa-list mr-3 text-blue-500"></i>Fogások listája
                </h3>
                <div class="table-container overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Dátum</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Helyszín</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Halfaj</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Súly</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Hossz</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Csali</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Műveletek</th>
                            </tr>
                        </thead>
                        <tbody id="naploTableBody" class="bg-white divide-y divide-gray-200">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Térkép szekció -->
        <div id="terkepSection" class="fade-in hidden">
            <div class="glass-card rounded-2xl shadow-card p-6 card-hover">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <i class="fas fa-map-marker-alt mr-3 text-blue-500"></i>Fogások térképen
                </h2>
                <div id="map" class="w-full h-96 rounded-lg"></div>
            </div>
        </div>
        
        <!-- Analízis szekció -->
        <div id="analizisSection" class="fade-in hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="glass-card rounded-2xl shadow-card p-6 card-hover">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-chart-line mr-3 text-blue-500"></i>Havi statisztikák
                    </h3>
                    <canvas id="monthlyChart"></canvas>
                </div>
                <div class="glass-card rounded-2xl shadow-card p-6 card-hover">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-fish mr-3 text-blue-500"></i>Halfaj statisztika
                    </h3>
                    <canvas id="fishChart"></canvas>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass-card rounded-2xl shadow-card p-6 card-hover">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-map-marker-alt mr-3 text-blue-500"></i>Helyszín statisztika
                    </h3>
                    <canvas id="locationChart"></canvas>
                </div>
                <div class="glass-card rounded-2xl shadow-card p-6 card-hover">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-moon mr-3 text-blue-500"></i>Holdfázis statisztika
                    </h3>
                    <canvas id="moonChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let markers = [];
        let monthlyChart, fishChart, locationChart, moonChart;
        
        // Szekció megjelenítése
        function showSection(section) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.getElementById(section + 'Link').classList.add('active');
            
            document.getElementById('naploSection').classList.add('hidden');
            document.getElementById('terkepSection').classList.add('hidden');
            document.getElementById('analizisSection').classList.add('hidden');
            
            document.getElementById(section + 'Section').classList.remove('hidden');
            document.getElementById(section + 'Section').classList.add('fade-in');
            
            if (section === 'terkep') {
                setTimeout(() => {
                    if (!map) {
                        initMap();
                    } else {
                        map.invalidateSize();
                    }
                }, 100);
            }
            
            if (section === 'analizis') {
                loadAnalysis();
            }
        }
        
        // Térkép inicializálása
        function initMap() {
            map = L.map('map').setView([48.15, 17.5], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            loadMapMarkers();
        }
        
        // GPS helymeghatározás
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        
                        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
                            .then(response => response.json())
                            .then(data => {
                                document.getElementById('helyszin').value = data.display_name || 'Ismeretlen';
                            });
                    },
                    (error) => {
                        alert('Nem sikerült meghatározni a helyzetet.');
                    }
                );
            } else {
                alert('A böngésző nem támogatja a geolokációt.');
            }
        }
        
        // Halfajok betöltése
        function loadHalfajok() {
            fetch('/api/halfajok')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('halfaj');
                    select.innerHTML = '<option value="">Válasszon halfajt...</option>';
                    data.forEach(halfaj => {
                        select.innerHTML += `<option value="${halfaj.id}">${halfaj.nev}</option>`;
                    });
                });
        }
        
        // Napló betöltése
        function loadNaplok() {
            fetch('/api/naplok')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('naploTableBody');
                    tbody.innerHTML = '';
                    data.forEach(naplo => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${new Date(naplo.datum).toLocaleDateString('hu-HU')}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${naplo.helyszin || '-'}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${naplo.halfaj_nev || '-'}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${naplo.suly || '-'}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${naplo.hossz || '-'}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">${naplo.csali || '-'}</td>
                            <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">
                                <button onclick="deleteNaplo(${naplo.id})" class="text-red-500 hover:text-red-700">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                });
        }
        
        // Térkép marker betöltése
        function loadMapMarkers() {
            fetch('/api/naplok')
                .then(response => response.json())
                .then(data => {
                    markers.forEach(marker => map.removeLayer(marker));
                    markers = [];
                    
                    data.forEach(naplo => {
                        if (naplo.latitude && naplo.longitude) {
                            const marker = L.marker([naplo.latitude, naplo.longitude])
                                .bindPopup(`<b>${naplo.helyszin}</b><br>${new Date(naplo.datum).toLocaleDateString('hu-HU')}`)
                                .addTo(map);
                            markers.push(marker);
                        }
                    });
                });
        }
        
        // Analízis betöltése
        function loadAnalysis() {
            fetch('/api/statistics/monthly')
                .then(response => response.json())
                .then(data => {
                    const ctx = document.getElementById('monthlyChart').getContext('2d');
                    if (monthlyChart) monthlyChart.destroy();
                    monthlyChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.labels,
                            datasets: [{
                                label: 'Fogások száma',
                                data: data.counts,
                                borderColor: '#3b82f6',
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                fill: true,
                                tension: 0.4
                            }, {
                                label: 'Összsúly (kg)',
                                data: data.weights,
                                borderColor: '#8b5cf6',
                                backgroundColor: 'rgba(139, 92, 246, 0.1)',
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { position: 'bottom' }
                            }
                        }
                    });
                });
            
            fetch('/api/statistics/fish')
                .then(response => response.json())
                .then(data => {
                    const ctx = document.getElementById('fishChart').getContext('2d');
                    if (fishChart) fishChart.destroy();
                    fishChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: data.labels,
                            datasets: [{
                                label: 'Fogások száma',
                                data: data.counts,
                                backgroundColor: ['#3b82f6', '#8b5cf6', '#f43f5e', '#10b981', '#f59e0b']
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { display: false }
                            }
                        }
                    });
                });
            
            fetch('/api/statistics/location')
                .then(response => response.json())
                .then(data => {
                    const ctx = document.getElementById('locationChart').getContext('2d');
                    if (locationChart) locationChart.destroy();
                    locationChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: data.labels,
                            datasets: [{
                                data: data.counts,
                                backgroundColor: ['#3b82f6', '#8b5cf6', '#f43f5e', '#10b981', '#f59e0b']
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { position: 'bottom' }
                            }
                        }
                    });
                });
            
            fetch('/api/statistics/moon')
                .then(response => response.json())
                .then(data => {
                    const ctx = document.getElementById('moonChart').getContext('2d');
                    if (moonChart) moonChart.destroy();
                    moonChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: data.labels,
                            datasets: [{
                                label: 'Átlagos súly (kg)',
                                data: data.weights,
                                backgroundColor: ['#3b82f6', '#8b5cf6', '#f43f5e', '#10b981']
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { display: false }
                            }
                        }
                    });
                });
        }
        
        // Napló mentése
        document.getElementById('naploForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('datum', document.getElementById('datum').value);
            formData.append('helyszin', document.getElementById('helyszin').value);
            formData.append('halfaj_id', document.getElementById('halfaj').value);
            formData.append('suly', document.getElementById('suly').value);
            formData.append('hossz', document.getElementById('hossz').value);
            formData.append('csali', document.getElementById('csali').value);
            formData.append('etetoanyag', document.getElementById('etetoanyag').value);
            formData.append('pva_hasznalata', document.getElementById('pva_hasznalata').checked);
            formData.append('pva_tartalom', document.getElementById('pva_tartalom').value);
            formData.append('megjegyzes', document.getElementById('megjegyzes').value);
            
            fetch('/api/naplok', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loadNaplok();
                loadMapMarkers();
                loadAnalysis();
                document.getElementById('naploForm').reset();
                document.getElementById('datum').valueAsDate = new Date();
            });
        });
        
        // Napló törlése
        function deleteNaplo(id) {
            if (confirm('Biztosan törli ezt a fogást?')) {
                fetch(`/api/naplok/${id}`, { method: 'DELETE' })
                    .then(() => {
                        loadNaplok();
                        loadMapMarkers();
                        loadAnalysis();
                    });
            }
        }
        
        // Importálás
        function importCatches() {
            const fileInput = document.getElementById('importFile');
            const statusSpan = document.getElementById('importStatus');
            
            if (fileInput.files.length === 0) {
                return;
            }
            
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            statusSpan.textContent = 'Importálás folyamatban...';
            statusSpan.className = 'ml-3 text-sm text-blue-500';
            
            fetch('/api/import', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    statusSpan.textContent = `Sikeres import: ${result.imported} fogás`;
                    statusSpan.className = 'ml-3 text-sm text-green-500';
                    
                    if (result.errors.length > 0) {
                        statusSpan.textContent += ` (${result.errors.length} hiba)`;
                    }
                    
                    loadNaplok();
                    loadAnalysis();
                } else {
                    statusSpan.textContent = 'Import hiba: ' + result.detail;
                    statusSpan.className = 'ml-3 text-sm text-red-500';
                }
            })
            .catch(error => {
                statusSpan.textContent = 'Import hiba: ' + error.message;
                statusSpan.className = 'ml-3 text-sm text-red-500';
            });
            
            fileInput.value = '';
        }
        
        // Inicializálás
        document.addEventListener('DOMContentLoaded', function() {
            loadHalfajok();
            loadNaplok();
            document.getElementById('datum').valueAsDate = new Date();
        });
    </script>
</body>
</html>
